name: Bug Report
description: Report a bug in Korvex
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal example or steps that trigger the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Korvex version
      placeholder: '0.0.1'
    validations:
      required: true

  - type: input
    id: rust
    attributes:
      label: Rust version
      placeholder: 'rustc 1.85.0'
    validations:
      required: true
